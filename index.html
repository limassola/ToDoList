<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ToDoList</title>
</head>
<body>
     <div class="container">
        <div class="todo_list">
            <h1>To Do List</h1>
            <div class="create_new_todo">
                <input type="text" class="message" placeholder="Планы на день">
                <button class="add_btn">Добавить</button>
            </div>
            <div class="wrapper">
                <ul class="todo"></ul>
            </div>
        </div>

        <div class="instruction">
        <ul class="instruction_item">
                Инструкция:
           <li> В поле ввода введите занятие которое вы запланировали на день.</li>
           <li> При клике правой кнопкой мыши, вы можете пометить занятие как "важное"</li>
           <li> При нажатие Cntr/Cmd + правой кнопки мыши, вы можете удалить занятие</li>
        </ul>
        </div>
     </div>
<script src="script.js"></script>
</body>
</html>
